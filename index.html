<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="sayfaBasligi">Esnaf Sitesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .hero-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .service-card:hover { transform: translateY(-2px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed">

    <script>
        const Dukkan = {
            isim: "Makas Aralığı Erkek Kuaförü",
            slogan: "Modern Kesim & Klasik Esnaf Ruhu",
            whatsapp: "905550000000",
            konum: "Makas Aralığı Erkek Kuaförü, Caferağa, Mühürdar Cd. No:40, 34710 Kadıköy/İstanbul", 
            hizmetler: [
                {ad: "Saç Kesimi", fiyat: "350 TL", ikon: "fa-scissors"},
                {ad: "Sakal Tasarım", fiyat: "200 TL", ikon: "fa-razor-blade"},
                {ad: "Cilt Bakımı", fiyat: "250 TL", ikon: "fa-sparkles"},
                {ad: "Vip Paket", fiyat: "700 TL", ikon: "fa-star"}
            ]
        };
    </script>

    <nav class="fixed top-0 w-full z-50 px-4 py-3">
        <div class="max-w-4xl mx-auto glass rounded-2xl shadow-sm border border-white/50 px-5 py-3 flex justify-between items-center">
            <span id="logo" class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent uppercase text-xs sm:text-lg"></span>
            <a id="waBtnUst" href="#" target="_blank" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl text-xs sm:text-sm font-bold transition-all shadow-lg flex items-center gap-2">
                <i class="fa-brands fa-whatsapp text-lg"></i> <span>Randevu</span>
            </a>
        </div>
    </nav>

    <header class="pt-32 pb-24 px-6 hero-gradient text-white text-center rounded-b-[3.5rem] shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <h1 id="heroIsim" class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight leading-tight uppercase"></h1>
            <p id="heroSlogan" class="text-lg opacity-90 max-w-xl mx-auto font-medium"></p>
        </div>
        <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
    </header>

    <main class="max-w-4xl mx-auto px-6 -mt-12 mb-16">
        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100 p-8 md:p-12 border border-slate-100">
            <h2 class="text-2xl font-extrabold mb-8 flex items-center gap-3 text-slate-800">
                <div class="w-2 h-8 bg-indigo-600 rounded-full"></div> Hizmetlerimiz
            </h2>
            <div id="liste" class="grid gap-4"></div>
        </div>
    </main>

    <section class="max-w-4xl mx-auto px-6 mb-20">
        <div class="bg-indigo-950 rounded-[2.5rem] p-10 text-white shadow-xl relative overflow-hidden">
            <div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-8 text-center md:text-left">
                <div>
                    <h3 class="text-3xl font-bold mb-3 text-white">Bize Ulaşın</h3>
                    <p id="konumMetni" class="opacity-70 mb-6 font-medium max-w-sm"></p>
                </div>
                <div class="flex flex-col gap-4 min-w-[200px] w-full md:w-auto">
                    <a id="haritaBtn" href="#" target="_blank" class="bg-white text-indigo-950 px-8 py-4 rounded-2xl font-extrabold hover:bg-indigo-50 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-location-arrow"></i> Yol Tarifi
                    </a>
                </div>
            </div>
            <div class="absolute left-[-5%] bottom-[-10%] opacity-5 text-[15rem]">
                <i class="fa-solid fa-map-location-dot text-white"></i>
            </div>
        </div>
    </section>

    <footer class="pb-12 text-center text-slate-400 text-sm">
        <p>© 2026 <span id="fIsim" class="font-bold text-slate-500"></span></p>
    </footer>

    <script>
        document.getElementById('sayfaBasligi').innerText = Dukkan.isim;
        document.getElementById('logo').innerText = Dukkan.isim;
        document.getElementById('heroIsim').innerText = Dukkan.isim;
        document.getElementById('heroSlogan').innerText = Dukkan.slogan;
        document.getElementById('konumMetni').innerText = Dukkan.konum;
        document.getElementById('fIsim').innerText = Dukkan.isim;

        const waLink = "https://wa.me/" + Dukkan.whatsapp + "?text=" + encodeURIComponent("Merhaba " + Dukkan.isim + ", randevu almak istiyorum.");
        document.getElementById('waBtnUst').href = waLink;

        const haritaLink = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(Dukkan.konum);
        document.getElementById('haritaBtn').href = haritaLink;

        const listeBox = document.getElementById('liste');
        Dukkan.hizmetler.forEach(h => {
            listeBox.innerHTML += '<div class="service-card group flex justify-between items-center p-5 rounded-2xl border border-slate-100 bg-slate-50 hover:bg-indigo-50 hover:border-indigo-200 transition-all shadow-sm">' +
                '<div class="flex items-center gap-4">' +
                    '<div class="w-12 h-12 rounded-xl bg-white shadow-sm flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all">' +
                        '<i class="fa-solid ' + (h.ikon || 'fa-check') + ' text-xl"></i>' +
                    '</div>' +
                    '<span class="font-bold text-slate-700 text-lg">' + h.ad + '</span>' +
                '</div>' +
                '<span class="font-black text-indigo-600 text-xl tracking-tight">' + h.fiyat + '</span>' +
            '</div>';
        });
    </script>
</body>
</html>
